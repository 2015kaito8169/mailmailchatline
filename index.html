<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公認のお知らせ - MailMailChat</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .cert-card {
            background: white;
            max-width: 600px;
            width: 90%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 8px solid #2e8b57;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        h1 {
            color: #2e8b57;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            background: #eaffea;
            color: #2e8b57;
            border: 2px solid #2e8b57;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .content {
            text-align: left;
            line-height: 1.8;
            background: #fafafa;
            padding: 20px;
            border-radius: 10px;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9em;
            color: #777;
        }
        .btn-link {
            display: inline-block;
            margin-top: 20px;
            color: #2e8b57;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="cert-card">
    <div class="icon">🤝</div>
    <h1>Official Announcement</h1>
    <div class="badge">WikiLand 公認決定</div>

    <div class="content">
        <p>MailMailChat 開発チームよりお知らせいたします。</p>
        <p>この度、当サービス <strong>MailMailChat</strong> は、<strong>WikiLand</strong> を公式提携パートナーとして正式に公認いたしました。</p>
        <p>今後、WikiLand内でのコミュニケーションインフラとして、より密接な連携とサポートを提供してまいります。</p>
    </div>

    <p class="footer">
        発表日: 2024年5月21日<br>
        <strong>MailMailChat Administration</strong>
    </p>

    <a href="https://mailmailchat.onrender.com" class="btn-link">← チャットへ戻る</a>
</div>

</body>
</html>
